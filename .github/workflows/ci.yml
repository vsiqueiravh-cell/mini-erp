name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: backend
        run: dotnet restore MiniErp.slnx

      - name: Build
        working-directory: backend
        run: dotnet build MiniErp.slnx --configuration Release --no-restore

      - name: Test
        working-directory: backend
        run: dotnet test MiniErp.slnx --configuration Release --no-build

      - name: Vulnerability audit
        working-directory: backend
        run: dotnet list MiniErp.slnx package --vulnerable --include-transitive

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test
